<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Checkout koolo</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<!-- HEADER -->

<header class="header">

<div class="logo-pro">

<img src="logo.png" alt="koolo" class="logo-img">

</div>

<div class="cart-header" onclick="irCheckout()">

<span class="cart-icon">🛒</span>

<span id="cartCount" class="cart-badge">0</span>

</div>

</header>


<!-- MAIN -->

<main class="checkout-container">

<section class="checkout-card">

<h2>
Tu pedido
</h2>

<div id="checkoutCarrito">

</div>

<h3>

Total:

<span id="checkoutTotal">
0.00 €
</span>

</h3>

</section>


<section class="checkout-card">

<h2>
Dirección de envío
</h2>

<form id="checkoutForm">

<label>
Nombre completo
</label>

<input
type="text"
id="nombre"
placeholder="Tu nombre"
required
>

<label>
Teléfono
</label>

<input
type="tel"
id="telefono"
placeholder="Tu teléfono"
required
>

<label>
Dirección
</label>

<input
type="text"
id="direccion"
placeholder="Calle y número"
required
>

<label>
Ciudad
</label>

<input
type="text"
id="ciudad"
placeholder="Ciudad"
required
>

<label>
Código postal
</label>

<input
type="text"
id="codigoPostal"
placeholder="Código postal"
required
>

<label>
Email (opcional)
</label>

<input
type="email"
id="email"
placeholder="correo@email.com"
>

<button
type="button"
class="btn-pagar"
onclick="crearPedido()"
>

Pagar

</button>

</form>

</section>

</main>


<!-- FOOTER -->

<footer class="footer">

<div class="socials">

<a
href="https://instagram.com/koolo.es"
target="_blank"
class="instagram-link"
>

<svg
xmlns="http://www.w3.org/2000/svg"
width="28"
height="28"
viewBox="0 0 24 24"
fill="currentColor"
>

<path d="M7.75 2C4.574 2 2 4.574 2 7.75v8.5C2 19.426 4.574 22 7.75 22h8.5C19.426 22 22 19.426 22 16.25v-8.5C22 4.574 19.426 2 16.25 2zm0 2h8.5A3.75 3.75 0 0 1 20 7.75v8.5A3.75 3.75 0 0 1 16.25 20h-8.5A3.75 3.75 0 0 1 4 16.25v-8.5A3.75 3.75 0 0 1 7.75 4m9.5 1a1.25 1.25 0 1 0 0 2.5A1.25 1.25 0 0 0 17.25 5M12 7a5 5 0 1 0 0 10a5 5 0 0 0 0-10m0 2a3 3 0 1 1 0 6a3 3 0 0 1 0-6"/>

</svg>

<span>
Instagram
</span>

</a>

</div>

<p class="footer-contacto">

Contacto:

<a href="mailto:koolo.es@gmail.com">
koolo.es@gmail.com
</a>

</p>

<p class="footer-copy">
© koolo 2026
</p>

</footer>


<script src="checkout.js"></script>

</body>
</html>
