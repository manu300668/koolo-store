<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout KOolo</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<header class="header">

<div class="logo-pro">
<img src="logo.png" class="logo-img">
</div>

<div class="cart-header" onclick="window.location.href='index.html'">
<span class="cart-icon">🏠</span>
<span id="cartCount" class="cart-badge">0</span>
</div>

</header>


<main class="checkout-container">

<section class="checkout-card">

<h2>Tu pedido</h2>

<div id="checkoutCarrito"></div>

<h3>Total: <span id="checkoutTotal">0.00 €</span></h3>

</section>


<section class="checkout-card">

<h2>Datos de envío</h2>

<label>Nombre</label>
<input id="nombre" type="text">

<label>Teléfono</label>
<input id="telefono" type="text">

<label>Dirección</label>
<input id="direccion" type="text">

<label>Ciudad</label>
<input id="ciudad" type="text">

<label>Código Postal</label>
<input id="codigoPostal" type="text">

<label>Email (opcional)</label>
<input id="email" type="email">

<button class="btn-pagar" onclick="crearPedido()">
Pagar
</button>

</section>

</main>


<footer class="footer">

<p>Contacto: koolo.es@gmail.com</p>

<p>© koolo 2026</p>

</footer>


<script src="checkout.js"></script>

</body>
</html>
