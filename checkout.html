<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - KOOLO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=TU_CLIENT_ID_PAYPAL&currency=EUR"></script>

<style>
body{margin:0;background:#000;color:white;font-family:Arial,sans-serif;padding:30px;}
input{width:100%;padding:10px;margin:10px 0;background:#111;border:1px solid #333;color:white;border-radius:5px;}
.order-summary{background:#111;padding:20px;margin-bottom:30px;border-radius:8px;}
h2,h3{margin:10px 0;}
</style>
</head>
<body>

<h1>Finalizar compra</h1>

<div class="order-summary">
  <h2>Resumen del pedido</h2>
  <div id="summary"></div>
  <h3>Total: <span id="total"></span> €</h3>
</div>

<h2>Datos de envío</h2>
<input type="text" id="name" placeholder="Nombre completo">
<input type="email" id="email" placeholder="Email">
<input type="text" id="address" placeholder="Dirección">
<input type="text" id="city" placeholder="Ciudad">
<input type="text" id="phone" placeholder="Teléfono">

<div id="paypal-button-container"></div>

<script>
const firebaseConfig={
  apiKey:"AIzaSyA7orSwoJ5XcDd-ABRj_o_OVySCdC05mxE",
  authDomain:"koolo2026.firebaseapp.com",
  projectId:"koolo2026",
  appId:"1:612039099714:web:38d14c2d43851c225c74db"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// Cargar carrito
let cart = JSON.parse(localStorage.getItem("checkoutCart"))||[];
let total = 0;
const summary=document.getElementById("summary");
const totalEl=document.getElementById("total");

cart.forEach(item=>{
  total += item.price;
  summary.innerHTML += `<p>${item.name} - ${item.price.toFixed(2)} €</p>`;
});
totalEl.innerText = total.toFixed(2);

// Crear pedido en Firestore antes de pago
async function createOrderInFirebase(data){
  const {name,email,address,city,phone} = data;
  const orderRef = await db.collection("orders").add({
    customer:{name,email,address,city,phone},
    items:cart,
    total:total,
    status:"Pendiente",
    date:new Date()
  });
  return orderRef.id;
}

// Renderizar botón PayPal
paypal.Buttons({
  style: { color: 'blue', shape: 'pill', label: 'pay' },
  createOrder: async (data, actions) => {
    const customerData = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      address: document.getElementById("address").value,
      city: document.getElementById("city").value,
      phone: document.getElementById("phone").value
    };
    if(!customerData.name || !customerData.email || !customerData.address){
      alert("Completa los campos obligatorios");
      return;
    }

    const orderId = await createOrderInFirebase(customerData);
    return actions.order.create({
      purchase_units: [{
        reference_id: orderId,
        amount: { value: total.toFixed(2) },
        description: "Pedido KOOLO",
      }]
    });
  },
  onApprove: async (data, actions) => {
    await actions.order.capture();
    // Actualizar pedido a Pagado
    const orderRef = db.collection("orders").doc(data.purchase_units[0].reference_id);
    await orderRef.update({status:"Pagado", paidAt: new Date()});
    // Limpiar carrito
    localStorage.removeItem("checkoutCart");
    localStorage.removeItem("cart");
    // Redirigir a success
    window.location.href="success.html";
  },
  onCancel: () => {
    window.location.href="cancel.html";
  },
  onError: (err) => {
    console.error(err);
    alert("Ocurrió un error en el pago");
  }
}).render('#paypal-button-container');

</script>

</body>
</html>
