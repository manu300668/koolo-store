<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | Koolo</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</head>

<body>

<header>

<div class="logo">
<img src="img/koolo_logo.png" alt="Koolo Logo">
</div>

<nav>

<a href="index.html">Inicio</a>
<a href="cart.html">Carrito</a>
<a href="admin.html">Admin</a>

</nav>

</header>


<main class="checkoutContainer">

<h1>Finalizar compra</h1>

<div class="checkoutBox">

<h2>Datos del cliente</h2>

<input type="text" id="nombre" placeholder="Nombre completo">

<input type="email" id="email" placeholder="Correo electrónico">

<input type="text" id="direccion" placeholder="Dirección de envío">


<h2>Resumen del pedido</h2>

<div id="listaResumen"></div>

<h3>Total: <span id="total">0</span> €</h3>


<div class="bizumBox">

<h2>Pagar con Bizum</h2>

<p>Envía el importe al siguiente número:</p>

<h3>+34 654 05 63 91</h3>

<p>Después pulsa el botón para confirmar el pedido.</p>

<button onclick="confirmarPedido()">

Confirmar pedido

</button>

</div>

</div>

</main>


<footer>

<p>© 2026 Koolo</p>

</footer>

<script src="checkout.js"></script>

</body>
</html>
