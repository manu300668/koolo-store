<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Koolo</title>

<link rel="stylesheet"
href="admin.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<div class="admin-header">

<h1>

Panel Admin Koolo

</h1>

<button
class="logout-btn"
onclick="logout()"
>

Cerrar sesión

</button>

</div>


<div class="admin-grid">

<!-- PRODUCTOS -->

<div class="card">

<h2>

Añadir producto

</h2>

<input
type="text"
id="nombre"
placeholder="Nombre producto"
>

<input
type="number"
id="precio"
placeholder="Precio"
step="0.01"
>

<input
type="text"
id="imagen"
placeholder="URL imagen"
>

<input
type="number"
id="stock"
placeholder="Stock"
>

<textarea
id="descripcion"
placeholder="Descripción"
></textarea>

<button onclick="crearProducto()">

Guardar producto

</button>

</div>


<!-- PEDIDOS -->

<div class="card">

<h2>

Pedidos

</h2>

<div id="listaPedidos">

Cargando pedidos...

</div>

</div>

</div>


<div class="card"
style="margin-top:30px;">

<h2>

Productos creados

</h2>

<div id="listaProductos">

Cargando productos...

</div>

</div>

<script src="admin.js"></script>

</body>
</html>
