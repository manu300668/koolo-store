<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin KOOLO</title>

<link rel="stylesheet" href="admin.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<header>

<h1>Panel Admin KOOLO</h1>

<a href="index.html">← Volver a la tienda</a>

</header>

<main>

<section class="panel">

<h2>Crear producto</h2>

<input id="nombre" placeholder="Nombre del producto">

<input id="precio" placeholder="Precio">

<input id="stock" placeholder="Stock">

<input id="imagen" placeholder="URL imagen">

<h3>Tallas</h3>

<label><input type="checkbox" value="S" class="talla"> S</label>
<label><input type="checkbox" value="M" class="talla"> M</label>
<label><input type="checkbox" value="L" class="talla"> L</label>
<label><input type="checkbox" value="XL" class="talla"> XL</label>

<br><br>

<button onclick="crearProducto()">Crear producto</button>

</section>


<section class="panel">

<h2>Productos</h2>

<div id="listaProductos"></div>

</section>


<section class="panel">

<h2>Pedidos</h2>

<div id="listaPedidos"></div>

</section>

</main>

<script src="admin.js"></script>

</body>
</html>
