<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin KOOLO</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:40px;
}

h1{
margin-bottom:30px;
}

.panel{
background:white;
padding:30px;
max-width:500px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
}

button{
padding:12px;
background:black;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Panel Admin KOOLO</h1>

<div class="panel">

<input id="nombre" placeholder="Nombre producto">

<input id="precio" placeholder="Precio">

<input id="imagen" placeholder="URL imagen">

<button onclick="subirProducto()">Subir producto</button>

<p id="mensaje"></p>

</div>


<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>


<script>

const firebaseConfig = {
apiKey: "AIzaSyA7orSwoJ5XcDd-ABRj_o_OVySCdC05mxE",
authDomain: "koolo2026.firebaseapp.com",
projectId: "koolo2026",
storageBucket: "koolo2026.firebasestorage.app",
messagingSenderId: "612039099714",
appId: "1:612039099714:web:38d14c2d43851c225c74db"
};

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()


function subirProducto(){

const nombre = document.getElementById("nombre").value
const precio = document.getElementById("precio").value
const imagen = document.getElementById("imagen").value

db.collection("productos").add({

nombre:nombre,
precio:precio,
imagen:imagen

})

.then(()=>{

document.getElementById("mensaje").innerText="Producto añadido"

})

.catch(()=>{

document.getElementById("mensaje").innerText="Error"

})

}

</script>

</body>
</html>
