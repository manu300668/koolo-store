<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin PRO v3 - KOOLO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;background:#0a0a0a;color:white;font-family:Arial;padding:20px;}
h1{margin-bottom:20px;}
section{background:#111;padding:20px;margin-bottom:20px;border-radius:10px;}
input,select{padding:8px;margin:5px 0;width:100%;background:#000;border:1px solid #333;color:white;border-radius:5px;}
button{padding:6px 12px;background:white;color:black;border:none;border-radius:5px;cursor:pointer;margin:3px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;}
.product-card{background:#000;padding:15px;border-radius:8px;border:1px solid #333;}
.badge{padding:3px 8px;border-radius:5px;font-size:12px;}
.active{background:green;}
.inactive{background:red;}
.lowstock{background:orange;}
</style>
</head>
<body>

<h1>Panel Admin PRO v3</h1>

<section>
<h2>Añadir Producto</h2>
<input type="text" id="pName" placeholder="Nombre">
<input type="number" id="pPrice" placeholder="Precio">
<input type="number" id="pStock" placeholder="Stock">
<input type="text" id="pImage" placeholder="URL Imagen">
<input type="text" id="pCategory" placeholder="Categoría">
<button onclick="addProduct()">Guardar Producto</button>
</section>

<section>
<h2>Buscar Producto</h2>
<input type="text" id="search" placeholder="Buscar..." onkeyup="filterProducts()">
</section>

<section>
<h2>Productos</h2>
<div class="grid" id="productsList"></div>
</section>

<script>
const firebaseConfig={
  apiKey:"AIzaSyA7orSwoJ5XcDd-ABRj_o_OVySCdC05mxE",
  authDomain:"koolo2026.firebaseapp.com",
  projectId:"koolo2026",
  appId:"1:612039099714:web:38d14c2d43851c225c74db"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

const ADMIN_EMAIL="eumanu@msn.com";

auth.onAuthStateChanged(user=>{
  if(!user || user.email!==ADMIN_EMAIL){
    alert("Acceso denegado");
    window.location.href="index.html";
  }
});

let allProducts=[];

db.collection("products").orderBy("createdAt","desc").onSnapshot(snapshot=>{
  allProducts=[];
  snapshot.forEach(doc=>{
    allProducts.push({id:doc.id,...doc.data()});
  });
  renderProducts(allProducts);
});

function renderProducts(products){
  const list=document.getElementById("productsList");
  list.innerHTML="";
  products.forEach(p=>{
    list.innerHTML+=`
      <div class="product-card">
        <strong>${p.name}</strong><br>
        ${p.price} €<br>
        Stock: ${p.stock} 
        ${p.stock<=5?'<span class="badge lowstock">Bajo</span>':''}
        <br>
        ${p.active?'<span class="badge active">Activo</span>':'<span class="badge inactive">Oculto</span>'}
        <br><br>
        <button onclick="toggleActive('${p.id}',${p.active})">
          ${p.active?"Ocultar":"Activar"}
        </button>
        <button onclick="deleteProduct('${p.id}')">Eliminar</button>
      </div>
    `;
  });
}

function filterProducts(){
  const text=document.getElementById("search").value.toLowerCase();
  const filtered=allProducts.filter(p=>p.name.toLowerCase().includes(text));
  renderProducts(filtered);
}

function addProduct(){
  const name=pName.value;
  const price=parseFloat(pPrice.value);
  const stock=parseInt(pStock.value);
  const image=pImage.value;
  const category=pCategory.value;

  db.collection("products").add({
    name,
    price,
    stock,
    image,
    category,
    active:true,
    createdAt:new Date()
  });

  pName.value="";pPrice.value="";pStock.value="";pImage.value="";pCategory.value="";
}

function deleteProduct(id){
  db.collection("products").doc(id).delete();
}

function toggleActive(id,current){
  db.collection("products").doc(id).update({active:!current});
}
</script>

</body>
</html>
