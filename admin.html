<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin KOOLO</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

</head>

<body>

<h1>Admin Panel KOOLO</h1>

<!-- LOGIN -->
<div id="loginBox">

<h2>Iniciar sesión</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="loginError" style="color:red"></p>

</div>


<!-- PANEL -->
<div id="adminPanel" style="display:none">

<h2>Crear producto</h2>

<input type="text" id="name" placeholder="Nombre producto">
<input type="number" id="price" placeholder="Precio">
<input type="text" id="image" placeholder="URL imagen">

<button onclick="addProduct()">Añadir producto</button>


<h2>Productos</h2>

<div id="productsAdmin"></div>


<h2>Pedidos</h2>

<div id="ordersAdmin"></div>

</div>

<script src="admin.js"></script>

</body>
</html>
