<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin koolo</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<header class="header">

  <div class="logo-pro">
    <img src="logo.png" class="logo-img">
  </div>

</header>


<!-- LOGIN -->

<div id="loginBox" class="checkout-card">

  <h2>Admin Login</h2>

  <input id="user" placeholder="Usuario">

  <input
    id="pass"
    type="password"
    placeholder="Contraseña"
  >

  <button
    class="btn-pagar"
    onclick="login()"
  >
    Entrar
  </button>

</div>


<!-- PANEL ADMIN -->

<div
  id="adminPanel"
  style="display:none;padding:20px;"
>

  <!-- PRODUCTOS -->

  <h2>Productos</h2>

  <div id="productosAdmin"></div>


  <!-- PEDIDOS -->

  <h2>Pedidos</h2>

  <div id="pedidosAdmin"></div>


  <!-- EDITOR PRODUCTO -->

  <div
    id="editorProducto"
    class="checkout-card"
    style="display:none;"
  >

    <h2>Editar producto</h2>

    <input
      id="editNombre"
      placeholder="Nombre"
    >

    <textarea
      id="editDescripcion"
      placeholder="Descripción"
      rows="4"
    ></textarea>

    <input
      id="editPrecio"
      type="number"
      placeholder="Precio"
    >

    <input
      id="editStock"
      type="number"
      placeholder="Stock"
    >

    <input
      id="editImagen"
      placeholder="URL imagen"
    >

    <img
      id="previewImagen"
      src=""
      style="
      max-width:150px;
      display:block;
      margin:10px 0;
      "
    >

    <button
      onclick="guardarEdicion()"
      class="btn-pagar"
    >
      Guardar cambios
    </button>

  </div>


  <!-- CREAR PRODUCTO -->

  <div class="checkout-card">

    <h2>Crear producto</h2>

    <input
      id="nombre"
      placeholder="Nombre"
    >

    <textarea
      id="descripcion"
      placeholder="Descripción del producto"
      rows="6"
    ></textarea>

    <input
      id="precio"
      type="number"
      placeholder="Precio"
    >

    <input
      id="stock"
      type="number"
      placeholder="Stock"
    >

    <input
      id="imagenUrl"
      placeholder="URL de la imagen"
    >

    <button
      onclick="crearProducto()"
      class="btn-pagar"
    >
      Crear producto
    </button>

  </div>

</div>


<script src="admin.js"></script>

</body>
</html>
