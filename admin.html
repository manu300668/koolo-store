<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin PRO - KOOLO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;background:#0a0a0a;color:white;font-family:Arial,sans-serif;padding:20px;}
h1{margin-bottom:30px;}
.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px;}
.card{background:#111;padding:20px;border-radius:10px;text-align:center;}
.card h2{margin:0;font-size:28px;}
section{background:#111;padding:20px;margin-bottom:20px;border-radius:10px;}
input,select{padding:8px;margin:5px 0;width:100%;background:#000;border:1px solid #333;color:white;border-radius:5px;}
button{padding:8px 15px;background:white;color:black;border:none;border-radius:5px;margin-top:10px;cursor:pointer;}
.order-card{background:#000;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #333;}
canvas{background:#000;padding:10px;border-radius:10px;}
</style>
</head>
<body>

<h1>Panel Admin PRO</h1>

<div class="dashboard">
  <div class="card">
    <p>Ventas Totales</p>
    <h2 id="totalSales">0 €</h2>
  </div>
  <div class="card">
    <p>Pedidos Pagados</p>
    <h2 id="paidOrders">0</h2>
  </div>
  <div class="card">
    <p>Pedidos Pendientes</p>
    <h2 id="pendingOrders">0</h2>
  </div>
  <div class="card">
    <p>Productos</p>
    <h2 id="totalProducts">0</h2>
  </div>
</div>

<section>
<h2>Gráfico Ventas</h2>
<canvas id="salesChart"></canvas>
</section>

<section>
<h2>Pedidos</h2>
<div id="ordersList"></div>
</section>

<script>
const firebaseConfig={
  apiKey:"AIzaSyA7orSwoJ5XcDd-ABRj_o_OVySCdC05mxE",
  authDomain:"koolo2026.firebaseapp.com",
  projectId:"koolo2026",
  appId:"1:612039099714:web:38d14c2d43851c225c74db"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

const ADMIN_EMAIL="eumanu@msn.com";

auth.onAuthStateChanged(user=>{
  if(!user || user.email!==ADMIN_EMAIL){
    alert("Acceso denegado");
    window.location.href="index.html";
  }
});

let chart;

// 🔹 Dashboard en tiempo real
db.collection("orders").onSnapshot(snapshot=>{
  let totalSales=0;
  let paid=0;
  let pending=0;
  let monthlySales={};

  snapshot.forEach(doc=>{
    const data=doc.data();
    if(data.status==="Pagado"){
      totalSales+=data.total;
      paid++;
      const month=new Date(data.date.seconds*1000).toLocaleString('es-ES',{month:'short'});
      monthlySales[month]=(monthlySales[month]||0)+data.total;
    }else{
      pending++;
    }
  });

  totalSalesEl.innerText=totalSales.toFixed(2)+" €";
  paidOrders.innerText=paid;
  pendingOrders.innerText=pending;

  updateChart(monthlySales);
});

db.collection("products").onSnapshot(snapshot=>{
  totalProducts.innerText=snapshot.size;
});

function updateChart(data){
  const labels=Object.keys(data);
  const values=Object.values(data);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("salesChart"),{
    type:"bar",
    data:{
      labels:labels,
      datasets:[{
        label:"Ventas €",
        data:values,
        backgroundColor:"white"
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      }
    }
  });
}

// 🔹 Pedidos
db.collection("orders").orderBy("date","desc").onSnapshot(snapshot=>{
  const list=document.getElementById("ordersList");
  list.innerHTML="";
  snapshot.forEach(doc=>{
    const data=doc.data();
    list.innerHTML+=`
      <div class="order-card">
        <strong>${data.customer?.name}</strong> - ${data.total} €<br>
        Estado: ${data.status}<br>
        <button onclick="updateOrder('${doc.id}','Pagado')">Pagado</button>
        <button onclick="updateOrder('${doc.id}','Enviado')">Enviado</button>
      </div>
    `;
  });
});

function updateOrder(id,status){
  db.collection("orders").doc(id).update({status});
}
</script>

</body>
</html>
