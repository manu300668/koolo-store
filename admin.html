<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin Koolo</title>
<link rel="stylesheet" href="admin.css">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</head>
<body>

<h1>Panel Admin Koolo</h1>

<h2>Agregar Producto</h2>
<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input id="imagen" placeholder="URL imagen">
<button onclick="agregarProducto()">Agregar</button>

<h2>Configuración Web</h2>
<input id="titulo" placeholder="Título web">
<input id="subtitulo" placeholder="Subtítulo">
<input id="logo" placeholder="URL Logo">
<input id="facebook" placeholder="Facebook">
<input id="instagram" placeholder="Instagram">
<input id="tiktok" placeholder="TikTok">
<button onclick="guardarConfig()">Guardar configuración</button>

<script src="admin.js"></script>
</body>
</html>
