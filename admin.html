<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - KOOLO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }

header {
  background:black;
  color:white;
  padding:15px;
  text-align:center;
}

.container { padding:20px; }

.dashboard {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:30px;
}

.card {
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
  text-align:center;
}

.alert-box {
  margin-bottom:30px;
}

.stock-alert {
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
}

.order-card {
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:8px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

button {
  padding:6px 10px;
  margin-top:8px;
  margin-right:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.enviar { background:orange; color:white; }
.entregado { background:green; color:white; }
.eliminar { background:red; color:white; }
</style>
</head>
<body>

<header>
  <h2>Panel Admin - KOOLO</h2>
</header>

<div class="container">

  <h3>Dashboard</h3>
  <div class="dashboard">
    <div class="card">
      <h4>Ventas Totales</h4>
      <p id="totalSales">0 €</p>
    </div>
    <div class="card">
      <h4>Ventas Hoy</h4>
      <p id="todaySales">0 €</p>
    </div>
    <div class="card">
      <h4>Pedidos Totales</h4>
      <p id="totalOrders">0</p>
    </div>
    <div class="card">
      <h4>Producto Más Vendido</h4>
      <p id="topProduct">-</p>
    </div>
  </div>

  <h3>Alertas de Stock</h3>
  <div id="stockAlerts" class="alert-box"></div>

  <h3>Pedidos</h3>
  <div id="ordersList"></div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AQUI_VA_TU_API_KEY",
  authDomain: "koolo2026.firebaseapp.com",
  projectId: "koolo2026",
  storageBucket: "koolo2026.firebasestorage.app",
  messagingSenderId: "612039099714",
  appId: "1:612039099714:web:38d14c2d43851c225c74db"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// 🔐 Seguridad: solo tu email puede entrar
auth.onAuthStateChanged(user => {
  if(!user || user.email !== "eumanu@msn.com"){
    alert("Acceso denegado ❌");
    window.location.href = "index.html";
  }
});


// ================= DASHBOARD + PEDIDOS =================

db.collection("orders")
.orderBy("createdAt","desc")
.onSnapshot(snapshot => {

  const container = document.getElementById("ordersList");
  container.innerHTML = "";

  let totalSales = 0;
  let todaySales = 0;
  let totalOrders = snapshot.size;
  let productCounter = {};

  const today = new Date();
  today.setHours(0,0,0,0);

  snapshot.forEach(doc => {

    const order = doc.data();
    const date = order.createdAt?.toDate();
    const orderTotal = order.total || 0;

    totalSales += orderTotal;

    if(date && date >= today){
      todaySales += orderTotal;
    }

    order.items.forEach(item => {
      if(!productCounter[item.name]){
        productCounter[item.name] = 0;
      }
      productCounter[item.name] += item.quantity;
    });

    let itemsHTML = "";
    order.items.forEach(item => {
      itemsHTML += `<li>${item.name} x${item.quantity}</li>`;
    });

    container.innerHTML += `
      <div class="order-card">
        <strong>Total:</strong> ${orderTotal.toFixed(2)} €<br>
        <strong>Estado:</strong> ${order.status}<br>
        <strong>Fecha:</strong> ${date ? date.toLocaleString() : "Procesando..."}
        <ul>${itemsHTML}</ul>

        <button class="enviar" onclick="updateStatus('${doc.id}','Enviado')">Enviado</button>
        <button class="entregado" onclick="updateStatus('${doc.id}','Entregado')">Entregado</button>
        <button class="eliminar" onclick="deleteOrder('${doc.id}')">Eliminar</button>
      </div>
    `;
  });

  let topProduct = "-";
  let max = 0;
  for(let product in productCounter){
    if(productCounter[product] > max){
      max = productCounter[product];
      topProduct = product;
    }
  }

  document.getElementById("totalSales").innerText = totalSales.toFixed(2) + " €";
  document.getElementById("todaySales").innerText = todaySales.toFixed(2) + " €";
  document.getElementById("totalOrders").innerText = totalOrders;
  document.getElementById("topProduct").innerText = topProduct;

});

function updateStatus(id,status){
  db.collection("orders").doc(id).update({ status });
}

function deleteOrder(id){
  if(confirm("¿Eliminar pedido?")){
    db.collection("orders").doc(id).delete();
  }
}


// ================= ALERTAS DE STOCK =================

db.collection("products").onSnapshot(snapshot => {

  const alertBox = document.getElementById("stockAlerts");
  alertBox.innerHTML = "";

  let alertCount = 0;

  snapshot.forEach(doc => {

    const product = doc.data();
    const stock = product.stock;

    if(stock <= 5){

      alertCount++;

      const color = stock === 0 ? "red" : "orange";
      const message = stock === 0 ? "AGOTADO" : "Stock bajo";

      alertBox.innerHTML += `
        <div class="stock-alert" style="border-left:5px solid ${color};">
          <strong>${product.name}</strong><br>
          Estado: <span style="color:${color};font-weight:bold;">
            ${message} (${stock})
          </span>
        </div>
      `;
    }

  });

  if(alertCount === 0){
    alertBox.innerHTML = `
      <div style="background:#e8ffe8;padding:10px;border-radius:6px;">
        ✅ Todo el stock está correcto
      </div>
    `;
  }

});
</script>

</body>
</html>
