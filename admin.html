<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin KOOLO</title>

<link rel="stylesheet" href="admin.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

</head>

<body>

<header>

<h1>Admin KOOLO</h1>

<a href="index.html">Volver a tienda</a>

</header>


<div class="container">


<section>

<h2>Crear producto</h2>

<input id="nombre" placeholder="Nombre producto">

<input id="precio" placeholder="Precio">

<input type="file" id="imagenFile">

<button onclick="subirProducto()">Crear producto</button>

</section>


<section>

<h2>Productos</h2>

<div id="productosAdmin"></div>

</section>


<section>

<h2>Configuración tienda</h2>

<h3>Logo</h3>

<input type="file" id="logoFile">

<h3>Color principal</h3>

<input type="color" id="colorPrincipal">

<h3>Redes</h3>

<input id="instagram" placeholder="Instagram">
<input id="facebook" placeholder="Facebook">
<input id="tiktok" placeholder="TikTok">

<button onclick="guardarConfig()">Guardar</button>

</section>


<section>

<h2>Pedidos</h2>

<div id="listaPedidos"></div>

</section>


</div>

<script src="admin.js"></script>

</body>
</html>
