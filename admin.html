<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin - KOOLO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;background:#000;color:white;font-family:Arial,sans-serif;padding:20px;}
h1{margin-bottom:20px;}
section{background:#111;padding:20px;margin-bottom:20px;border-radius:10px;}
input,select{padding:8px;margin:5px 0;width:100%;background:#000;border:1px solid #333;color:white;border-radius:5px;}
button{padding:8px 15px;background:white;color:black;border:none;border-radius:5px;margin-top:10px;cursor:pointer;}
.product-card, .order-card{background:#000;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #333;}
.flex{display:flex;gap:10px;flex-wrap:wrap;}
.small-btn{padding:5px 10px;font-size:12px;}
</style>
</head>
<body>

<h1>Panel Admin - KOOLO</h1>

<section>
<h2>Añadir Producto</h2>
<input type="text" id="pName" placeholder="Nombre">
<input type="number" id="pPrice" placeholder="Precio">
<input type="text" id="pImage" placeholder="URL Imagen">
<select id="pCategory"></select>
<button onclick="addProduct()">Guardar Producto</button>
</section>

<section>
<h2>Productos</h2>
<div id="productsList"></div>
</section>

<section>
<h2>Categorías</h2>
<input type="text" id="newCategory" placeholder="Nueva categoría">
<button onclick="addCategory()">Añadir</button>
<div id="categoriesList"></div>
</section>

<section>
<h2>Pedidos</h2>
<div id="ordersList"></div>
</section>

<section>
<h2>Redes Sociales</h2>
<input type="text" id="socialName" placeholder="Nombre (Instagram)">
<input type="text" id="socialLink" placeholder="URL">
<button onclick="addSocial()">Guardar</button>
<div id="socialList"></div>
</section>

<script>
const firebaseConfig={
  apiKey:"AIzaSyA7orSwoJ5XcDd-ABRj_o_OVySCdC05mxE",
  authDomain:"koolo2026.firebaseapp.com",
  projectId:"koolo2026",
  appId:"1:612039099714:web:38d14c2d43851c225c74db"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

const ADMIN_EMAIL="eumanu@msn.com";

auth.onAuthStateChanged(user=>{
  if(!user || user.email!==ADMIN_EMAIL){
    alert("Acceso denegado");
    window.location.href="index.html";
  }
});

// 🔹 PRODUCTOS
function loadProducts(){
  db.collection("products").onSnapshot(snapshot=>{
    const list=document.getElementById("productsList");
    list.innerHTML="";
    snapshot.forEach(doc=>{
      const data=doc.data();
      list.innerHTML+=`
        <div class="product-card">
          ${data.name} - ${data.price} € (${data.category})
          <div class="flex">
            <button class="small-btn" onclick="deleteProduct('${doc.id}')">Eliminar</button>
          </div>
        </div>
      `;
    });
  });
}

function addProduct(){
  const name=pName.value;
  const price=parseFloat(pPrice.value);
  const image=pImage.value;
  const category=pCategory.value;

  db.collection("products").add({
    name,price,image,category
  });

  pName.value="";pPrice.value="";pImage.value="";
}

function deleteProduct(id){
  db.collection("products").doc(id).delete();
}

// 🔹 CATEGORÍAS
function loadCategories(){
  db.collection("categories").onSnapshot(snapshot=>{
    const list=document.getElementById("categoriesList");
    const select=document.getElementById("pCategory");
    list.innerHTML="";
    select.innerHTML="";
    snapshot.forEach(doc=>{
      list.innerHTML+=`
        <div>${doc.data().name}
        <button onclick="deleteCategory('${doc.id}')">Eliminar</button>
        </div>`;
      select.innerHTML+=`<option>${doc.data().name}</option>`;
    });
  });
}

function addCategory(){
  const name=newCategory.value;
  db.collection("categories").add({name});
  newCategory.value="";
}

function deleteCategory(id){
  db.collection("categories").doc(id).delete();
}

// 🔹 PEDIDOS
function loadOrders(){
  db.collection("orders").orderBy("date","desc").onSnapshot(snapshot=>{
    const list=document.getElementById("ordersList");
    list.innerHTML="";
    snapshot.forEach(doc=>{
      const data=doc.data();
      list.innerHTML+=`
        <div class="order-card">
          <strong>${data.customer?.name}</strong><br>
          ${data.total} € - Estado: ${data.status}
          <br>
          <button onclick="updateOrder('${doc.id}','Pagado')">Marcar Pagado</button>
          <button onclick="updateOrder('${doc.id}','Enviado')">Marcar Enviado</button>
        </div>
      `;
    });
  });
}

function updateOrder(id,status){
  db.collection("orders").doc(id).update({status});
}

// 🔹 REDES
function loadSocial(){
  db.collection("settings").doc("social").onSnapshot(doc=>{
    const list=document.getElementById("socialList");
    list.innerHTML="";
    if(doc.exists){
      doc.data().links.forEach((s,i)=>{
        list.innerHTML+=`
          <div>${s.name} - ${s.url}
          <button onclick="removeSocial(${i})">Eliminar</button>
          </div>`;
      });
    }
  });
}

async function addSocial(){
  const name=socialName.value;
  const url=socialLink.value;
  const ref=db.collection("settings").doc("social");
  const doc=await ref.get();
  let links=[];
  if(doc.exists) links=doc.data().links;
  links.push({name,url});
  ref.set({links});
  socialName.value="";socialLink.value="";
}

async function removeSocial(index){
  const ref=db.collection("settings").doc("social");
  const doc=await ref.get();
  let links=doc.data().links;
  links.splice(index,1);
  ref.set({links});
}

loadProducts();
loadCategories();
loadOrders();
loadSocial();
</script>

</body>
</html>
