<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin KOOLO</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<h1>Panel Admin KOOLO</h1>

<section>
  <h2>Categorías</h2>
  <input type="text" id="newCategory" placeholder="Nueva categoría">
  <button onclick="addCategory()">Añadir categoría</button>
  <ul id="categoriesList"></ul>
</section>

<section>
  <h2>Productos</h2>
  <input type="text" id="productName" placeholder="Nombre">
  <input type="number" id="productPrice" placeholder="Precio">
  <input type="number" id="productStock" placeholder="Stock">
  <input type="text" id="productImage" placeholder="URL imagen">
  <select id="productCategory"></select>
  <button onclick="addProduct()">Añadir producto</button>
  <ul id="productsListAdmin"></ul>
</section>

<script src="admin.js"></script>
</body>
</html>
