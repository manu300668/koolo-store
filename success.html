<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pago completado - KOOLO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 50px;
}
h1 { color: green; }
</style>
</head>
<body>

<h1>Pago completado 🎉</h1>
<p>Procesando pedido...</p>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA7orSwoJ5XcDd-ABRj_o_OVySCdC05mxE",
  authDomain: "koolo2026.firebaseapp.com",
  projectId: "koolo2026",
  storageBucket: "koolo2026.firebasestorage.app",
  messagingSenderId: "612039099714",
  appId: "1:612039099714:web:38d14c2d43851c225c74db"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function processOrder() {

  if(localStorage.getItem("orderProcessed")) return;

  const cart = JSON.parse(localStorage.getItem("cart")) || [];

  if(cart.length === 0) return;

  try {

    // Guardar pedido
    const orderRef = await db.collection("orders").add({
      items: cart,
      total: cart.reduce((sum, item) => sum + item.price * item.quantity, 0),
      status: "Pagado",
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    // Descontar stock
    for(const item of cart) {
      const productRef = db.collection("products").doc(item.id);
      await db.runTransaction(async (transaction) => {
        const doc = await transaction.get(productRef);
        if (!doc.exists) return;

        const newStock = doc.data().stock - item.quantity;
        transaction.update(productRef, { stock: newStock });
      });
    }

    localStorage.removeItem("cart");
    localStorage.setItem("orderProcessed", "true");

    document.body.innerHTML = `
      <h1>Pedido confirmado 🎉</h1>
      <p>Gracias por tu compra.</p>
      <a href="index.html">Volver a la tienda</a>
    `;

  } catch(error) {
    console.error(error);
    document.body.innerHTML = "<h1>Error procesando pedido</h1>";
  }
}

processOrder();
</script>

</body>
</html>
