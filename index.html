<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOOLO - Streetwear Premium</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- ================= HEADER ================= -->
<header>
  <div class="logo">
    <img src="img/koolo_logo.png" alt="KOOLO">
  </div>

  <div class="nav-right">

    <!-- CATEGORÍAS -->
    <div class="categories-menu" id="categoriesMenu"></div>

    <!-- CARRITO -->
    <div class="cart-icon" onclick="window.location.href='cart.html'">
      🛒
      <span id="cartCount">0</span>
    </div>

    <!-- ADMIN y LOGOUT -->
    <a href="admin.html" class="admin-btn">Admin</a>
    <button id="logoutBtn" style="display:none;">Cerrar sesión</button>

    <!-- HAMBURGUESA -->
    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>
</header>

<!-- ================= HERO ================= -->
<section class="hero">
  <div class="hero-overlay">
    <h1>Nueva Colección 2026</h1>
    <p>Streetwear minimalista con estilo premium</p>
    <a href="#productsList" class="hero-btn">Ver Colección</a>
  </div>
</section>

<!-- ================= PRODUCTOS ================= -->
<div class="products-container" id="productsList"></div>

<!-- ================= SCRIPT ================= -->
<script src="login.js"></script> <!-- Maneja Firebase Auth -->
<script src="script.js"></script> <!-- Productos, carrito, categorías, Admin visibilidad -->

</body>
</html>
