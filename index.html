<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Koolo</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- HEADER -->

<header class="header">

<div class="logo-container">

<a href="index.html">

<img src="img/koolo_logo.png" alt="Koolo Logo" class="logo">

</a>

</div>

<nav class="menu">

<a href="index.html">Inicio</a>
<a href="login.html">Login</a>
<a href="admin.html">Admin</a>

</nav>

<button class="cart-button" onclick="abrirCarrito()">

🛒 Carrito (<span id="contadorCarrito">0</span>)

</button>

</header>


<!-- PRODUCTOS -->

<main>

<section id="productosContainer" class="productos">

<h2>Cargando...</h2>

</section>

</main>


<!-- CARRITO -->

<div id="carritoPanel" class="carritoPanel oculto">

<h2>Carrito</h2>

<div id="listaCarrito"></div>

<p>

Total: <span id="totalCarrito">0</span> €

</p>

<button onclick="vaciarCarrito()">

Vaciar carrito

</button>

<button onclick="window.location.href='checkout.html'">

Comprar

</button>

<button onclick="cerrarCarrito()">

Cerrar

</button>

</div>


<!-- FOOTER -->

<footer class="footer">

<div class="redes">

<a href="#">Instagram</a>

</div>

<p>© 2026 Koolo</p>

</footer>


<script src="script.js"></script>

</body>
</html>
