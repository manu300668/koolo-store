<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Koolo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<!-- PayPal -->
<script src="https://www.paypal.com/sdk/js?client-id=TU_PAYPAL_CLIENT_ID&currency=EUR"></script>

</head>
<body>

<header>
  <div class="logo">
    <a href="index.html"><img id="logoImg" src="img/logo.png" alt="Koolo Logo"></a>
  </div>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="login.html">Login</a>
    <a href="admin.html">Admin</a>
    <a onclick="abrirCarrito()">🛒 Carrito</a>
  </nav>
</header>

<section class="productos" id="productosContainer"></section>

<div id="carritoPanel">
  <h2>Carrito</h2>
  <div id="carritoItems"></div>
  <h3>Total: <span id="carritoTotal">0</span> €</h3>
  <div id="paypal-button-container"></div>
  <button onclick="cerrarCarrito()">Cerrar</button>
</div>

<footer>
  <div class="redes">
    <a id="facebookLink" target="_blank">Facebook</a>
    <a id="instagramLink" target="_blank">Instagram</a>
    <a id="tiktokLink" target="_blank">TikTok</a>
  </div>
  <p>© 2026 Koolo</p>
</footer>

<script src="script.js"></script>
</body>
</html>
