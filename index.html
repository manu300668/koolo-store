<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOOLO - Tienda</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
body { font-family: Arial,sans-serif; margin:0; background:#f5f5f5; }
header { background:#000; color:white; display:flex; align-items:center; justify-content:space-between; padding:10px 20px; }
.logo img { height:50px; }
.nav-buttons button { margin:0 5px; padding:8px 15px; cursor:pointer; }
.products { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; padding:20px; }
.product-card { background:#fff; border-radius:10px; padding:10px; text-align:center; position:relative; }
.product-card img { max-width:100%; border-radius:8px; }
.out-of-stock { position:absolute; top:10px; left:10px; color:white; padding:5px 8px; border-radius:5px; font-size:12px; }
.out-of-stock.agotado { background:red; }
.out-of-stock.bajo { background:orange; }
button.buy { margin-top:10px; padding:8px 12px; cursor:pointer; border:none; border-radius:5px; background:green; color:white; }
button.buy[disabled] { background:gray; cursor:not-allowed; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="img/koolo_logo.png" alt="KOOLO">
  </div>
  <div class="nav-buttons">
    <button onclick="window.location.href='index.html'">Inicio</button>
    <button onclick="window.location.href='login.html'">Login</button>
    <button onclick="window.location.href='categories.html'">Categorías</button>
    <button id="adminBtn" style="display:none;" onclick="window.location.href='admin.html'">Admin</button>
    <button onclick="window.location.href='cart.html'">Carrito</button>
  </div>
</header>

<div class="products" id="productsList"></div>

<script>
const firebaseConfig = {
  apiKey: "AQUI_VA_TU_API_KEY",
  authDomain: "koolo2026.firebaseapp.com",
  projectId: "koolo2026",
  storageBucket: "koolo2026.firebasestorage.app",
  messagingSenderId: "612039099714",
  appId: "1:612039099714:web:38d14c2d43851c225c74db"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Mostrar botón admin solo para tu email
auth.onAuthStateChanged(user => {
  if(user && user.email === "eumanu@msn.com") {
    document.getElementById("adminBtn").style.display = "inline-block";
  }
});

// Cargar productos
db.collection("products").orderBy("createdAt","desc").onSnapshot(snapshot=>{
  const list = document.getElementById("productsList");
  list.innerHTML = "";
  snapshot.forEach(doc=>{
    const p = doc.data();
    const outStock = p.stock <= 0;
    const lowStock = p.stock > 0 && p.stock <= 5; // Stock bajo

    list.innerHTML += `
      <div class="product-card">
        ${outStock?'<div class="out-of-stock agotado">Agotado</div>':''}
        ${lowStock?'<div class="out-of-stock bajo">Bajo</div>':''}
        <img src="${p.image}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>${p.price} €</p>
        <p>Stock: ${p.stock}</p>
        <button class="buy" ${outStock?'disabled':''} onclick='addToCart("${doc.id}","${p.name}",${p.price},1)'>
          ${outStock?'Agotado':'Añadir al carrito'}
        </button>
      </div>
    `;
  });
});

// Añadir al carrito
function addToCart(id,name,price,quantity){
  const product = cart.find(item => item.id === id);
  if(product){
    product.quantity += quantity;
  } else {
    cart.push({id,name,price,quantity});
  }
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(name + " añadido al carrito ✅");
}
</script>

</body>
</html>
