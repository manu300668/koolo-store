<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOOLO PRO</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- PayPal -->
<script src="https://www.paypal.com/sdk/js?client-id=TU_CLIENT_ID&currency=EUR"></script>

</head>

<body>

<header class="header">

<div class="left">
<div class="hamburger" id="hamburger">
<span></span>
<span></span>
<span></span>
</div>
<a href="index.html" class="logo">
<img src="img/koolo_logo.png" alt="KOOLO">
</a>
</div>

<nav class="nav" id="navMenu">
<a href="index.html">Inicio</a>
<a href="#productsList">Colección</a>
</nav>

<div class="header-right">
<a href="login.html" class="admin-btn">Admin</a>
<div class="cart-icon" id="cartIcon">🛒 <span id="cartCount">0</span></div>
</div>

</header>

<!-- HERO PREMIUM -->
<section class="hero">
<h1>Bienvenido a KOOLO</h1>
<p>Descubre nuestra colección exclusiva</p>
<a href="#productsList" class="btn-hero">Ver colección</a>
</section>

<!-- BUSCADOR -->
<div class="search-bar">
<input type="text" id="searchInput" placeholder="Buscar productos...">
</div>

<!-- FILTROS -->
<div class="filters">
<button onclick="filterProducts('all')">Todo</button>
<button onclick="filterProducts('camisetas')">Camisetas</button>
<button onclick="filterProducts('sudaderas')">Sudaderas</button>
<button onclick="filterProducts('gorras')">Gorras</button>
</div>

<!-- CARRITO -->
<div class="cart-panel" id="cartPanel">
<h2>Tu carrito</h2>
<div id="cartItems"></div>
<p class="cart-total">Total €<span id="cartTotal">0</span></p>
<div id="paypal-button-container"></div>
</div>

<!-- PRODUCTOS -->
<section class="products" id="productsList"></section>

<script src="script.js"></script>
</body>
</html>
