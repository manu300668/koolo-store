<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito - KOOLO</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
body { font-family: Arial,sans-serif; background:#f5f5f5; margin:0; padding:20px; }
h1 { text-align:center; }
.cart-item { background:#fff; padding:10px; margin:10px 0; border-radius:8px; display:flex; align-items:center; justify-content:space-between; }
.cart-item img { width:80px; border-radius:5px; }
button { padding:5px 10px; margin-left:5px; border:none; border-radius:5px; cursor:pointer; }
button:disabled { background:gray; cursor:not-allowed; }
.total { font-weight:bold; margin-top:20px; text-align:right; font-size:18px; }
</style>
</head>
<body>

<h1>Carrito</h1>
<div id="cartList"></div>
<div class="total" id="totalAmount">Total: 0 €</div>
<button id="checkoutBtn">Ir a pagar</button>

<script>
const firebaseConfig = {
  apiKey: "AQUI_VA_TU_API_KEY",
  authDomain: "koolo2026.firebaseapp.com",
  projectId: "koolo2026",
  storageBucket: "koolo2026.firebasestorage.app",
  messagingSenderId: "612039099714",
  appId: "1:612039099714:web:38d14c2d43851c225c74db"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Renderizar carrito
function renderCart() {
  const cartDiv = document.getElementById("cartList");
  cartDiv.innerHTML = "";
  let total = 0;

  cart.forEach((item,index) => {
    db.collection("products").doc(item.id).get().then(doc => {
      if(!doc.exists) return;
      const data = doc.data();
      const stock = data.stock;

      // Ajustar cantidad si excede stock
      if(item.quantity > stock) item.quantity = stock;

      total += item.price * item.quantity;

      cartDiv.innerHTML += `
        <div class="cart-item">
          <img src="${data.image}" alt="${item.name}">
          <div>
            <strong>${item.name}</strong><br>
            ${item.price} € x 
            <input type="number" min="1" max="${stock}" value="${item.quantity}" style="width:50px;" onchange="updateQuantity(${index},this.value,${stock})">
            <br>Stock disponible: ${stock}
          </div>
          <div>
            <button onclick="removeItem(${index})">Eliminar</button>
          </div>
        </div>
      `;
    });
  });

  setTimeout(()=>{ // espera a que async renderice
    document.getElementById("totalAmount").innerText = "Total: " + total.toFixed(2) + " €";
    localStorage.setItem("cart", JSON.stringify(cart));
  }, 200);
}

// Actualizar cantidad
function updateQuantity(index,value,max){
  value = parseInt(value);
  if(value > max){
    alert("No puedes añadir más unidades que el stock disponible ✅");
    value = max;
  }
  if(value < 1) value = 1;
  cart[index].quantity = value;
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

// Eliminar producto
function removeItem(index){
  cart.splice(index,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

// Checkout
document.getElementById("checkoutBtn").addEventListener("click",()=>{
  if(cart.length===0){
    alert("El carrito está vacío ❌");
    return;
  }
  // Redirigir a PayPal o success.html según tu integración
  window.location.href="success.html";
});

renderCart();
</script>
</body>
</html>
